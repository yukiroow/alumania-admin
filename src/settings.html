                </a>
            </li>
            <li>
                <a href="create.html">
                    <img src ="/res/add_circle.png" alt="Create">

            <li>
                <a href="users.html">

        <div class="user-profile">

    </nav>

<div class="content-container">
    <div class="header">
        <h1>Settings</h1>
        <p>Logout or generate a new admin key</p>
    </div>

    <main class="main-content">
        <div class="logout">
            <script src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" type="module"></script> 
            <dotlottie-player id="logout-animation"src="https://lottie.host/f7a742ba-808a-4b0c-b29f-ca0d1e985b30/0utrtWPYc3.json" background="transparent" speed="1"></dotlottie-player>
            <p>Logout</p>
            <div class="popup" id="popup-logout">
                <div class="overlay" onclick="togglePopup('popup-logout')"></div> 
                <div class="content-logout">
                    <div class="close-btn" onclick="togglePopup()">&times;</div>
                    <h1>Confirm Logout</h1>
                    <hr>
                    <p>Are you sure you want to log out?</p>
                    <div class="button-container">
                        <button class="cancel-btn">Cancel</button>
                        <button class="ok-btn">Logout</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="generate">
            <script src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" type="module"></script> 
            <dotlottie-player id="generate-animation" src="https://lottie.host/1c7b457d-d7a7-4aac-98f9-d8f5c0ab90e7/cK1MYzB7Cw.json" background="transparent" speed="1"></dotlottie-player>
            <p>Generate new admin key</p>
            <div class="popup" id="popup-generate">
                <div class="overlay" onclick="togglePopup('popup-generate')"></div>
                <div class="content-generate">
                    <div class="close-btn" onclick="togglePopup()">&times;</div>
                    <h1>Generate new admin key</h1>
                    <hr>
                    <p>ah maya ka na worlds muna</p>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const navbar = document.querySelector('.navbar');
    const navToggle = document.querySelector('.nav-toggle');
    const contentContainer = document.querySelector('.content-container');

    navToggle.addEventListener('click', () => {
        navbar.classList.toggle('collapsed');
        mainContent.classList.toggle('shifted'); 
    });  
</script>

<script>
    const logoutAnimation = document.getElementById("logout-animation");
    const generateAnimation = document.getElementById("generate-animation");

    document.querySelector(".logout").addEventListener("mouseenter", () => {
        logoutAnimation.setAttribute("loop", "true");
        logoutAnimation.play();
    });

    document.querySelector(".logout").addEventListener("mouseleave", () => {
        logoutAnimation.removeAttribute("loop");
    });

    document.querySelector(".generate").addEventListener("mouseenter", () => {
        generateAnimation.setAttribute("loop", "true");
        generateAnimation.play();
    });

    document.querySelector(".generate").addEventListener("mouseleave", () => {
        generateAnimation.removeAttribute("loop");
        generateAnimation.stop();
    });

    document.querySelector(".logout").addEventListener("click", () => togglePopup("popup-logout"));
    document.querySelector(".generate").addEventListener("click", () => togglePopup("popup-generate"));
    function togglePopup(popupId) {
        document.getElementById(popupId).classList.toggle("active");
    }

</script>
</body>
